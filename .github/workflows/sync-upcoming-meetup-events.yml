name: sync-upcoming-meetup-events

on:
  schedule:
    - cron: "30 2 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Sync upcoming Meetup events
        id: sync
        run: |
          python scripts/sync_upcoming_meetup_events.py | tee /tmp/meetup-sync.log
          if git diff --quiet -- index.md; then
            echo "changes=false" >> "$GITHUB_OUTPUT"
          else
            echo "changes=true" >> "$GITHUB_OUTPUT"
            tail -n 1 /tmp/meetup-sync.log >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Commit and push
        if: steps.sync.outputs.changes == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.md
          git commit -m "chore: sync upcoming Meetup events [skip ci]"
          git push
